<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="row-one-group">

                <div class="row-one-left">
                    <img src="#" alt="search glass">
                    <input type="search" name="search-field" id="search" aria-label="search-site-content">
                </div>

                <div class="row-one-right">
                    <img src="#" alt="notification">
                    <img src="#" alt="profile picture">
                    <span class="username">Morgan Oakley</span>
                </div>
            </div>

            <div class="row-two-group">
                <div class="row-two-left">
                    <img src="#" alt="profile picture">
                    <p>Hi there,</p>
                    <p>Morgan Oakley (@morgan)</p>
                </div>
                <div class="row-two-right">
                    <a href="#">New</a>
                    <a href="#">Upload</a>
                    <a href="#">Share</a>
                </div>
            </div>

        </div>
        <div class="sidebar">

            <div class="sidebar-logo">
                <h1>Dashboard</h1>
            </div>
        
            <div class="sidebar-links">

                <div class="link-section-one">
                    <a href="">Home</a>
                    <a href="">Profile</a>
                    <a href="">Messages</a>
                    <a href="">History</a>
                    <a href="">Tasks</a>
                    <a href="">Communities</a>
                </div>
                <div class="link-section-two">
                    <a href="" class="settings-link">Settings</a>
                    <a href="">Support</a>
                    <a href="">Privacy</a>
                </div>
            </div>
        </div>
        <div class="main">
            <p>main</p>
        </div>
    </div>
</body>
</html>
